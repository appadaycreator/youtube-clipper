<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン - YouTube切り抜きシステム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 20px; font-weight: 700; color: #fff; }
  .logo h1 span { color: #ff4e4e; }
  .logo p { font-size: 13px; color: #666; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
  .field input {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 12px 14px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: #ff4e4e; }
  .btn {
    width: 100%;
    background: #ff4e4e;
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn:hover { background: #e63e3e; }
  .btn:disabled { background: #555; cursor: not-allowed; }
  .error {
    background: #2d1515;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    padding: 10px 14px;
    color: #fca5a5;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .server-note {
    font-size: 12px;
    color: #555;
    text-align: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #222;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>▶ YouTube <span>切り抜き</span></h1>
    <p>個人管理ツール</p>
  </div>
  <div class="field">
    <label>ユーザー名</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username" />
  </div>
  <div class="field">
    <label>パスワード</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">ログイン</button>
  <div class="error" id="errorMsg">ユーザー名またはパスワードが違います</div>
  <div class="server-note">ローカルサーバー (192.168.2.131) に接続します</div>
</div>

<script>
const API_BASE = 'http://192.168.2.131:9001';
const TOKEN_KEY = 'clipper_token';

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Already logged in?
if (localStorage.getItem(TOKEN_KEY)) {
  window.location.href = 'index.html';
}

// URL param auto-auth: ?p=clipper2026
(function() {
  const p = new URLSearchParams(location.search).get('p');
  if (p === 'clipper2026') {
    history.replaceState({}, '', location.pathname);
    autoLogin('admin', 'clipper2026');
  }
})();

async function autoLogin(user, pass) {
  try {
    const resp = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass }),
    });
    if (resp.ok) {
      const data = await resp.json();
      localStorage.setItem(TOKEN_KEY, data.token);
      window.location.href = 'index.html';
    }
  } catch (e) { /* fall through to manual login */ }
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const resp = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (resp.ok) {
      const data = await resp.json();
      localStorage.setItem(TOKEN_KEY, data.token);
      window.location.href = 'index.html';
    } else {
      err.style.display = 'block';
      btn.disabled = false;
    }
  } catch (e) {
    err.textContent = 'サーバーに接続できません。ローカルサーバーが起動しているか確認してください。';
    err.style.display = 'block';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
